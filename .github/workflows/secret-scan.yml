name: secret-scan

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      # Install a pinned gitleaks and scan the full history directly. The
      # gitleaks-action wrapper computes a commit range from the push event,
      # which is invalid for a repo's initial push (the root commit has no
      # parent); scanning `gitleaks git .` avoids that entirely.
      - name: Install gitleaks
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz" -o gitleaks.tgz
          tar -xzf gitleaks.tgz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
      - name: Scan full history
        run: gitleaks git . --config .gitleaks.toml --redact --exit-code 1 --verbose
