name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: rag
      - run: cargo fmt --manifest-path rag/Cargo.toml --check
      - run: cargo clippy --manifest-path rag/Cargo.toml --all-targets -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: rag
      # The end-to-end test downloads the embedding model on first run; cache it
      # so later runs reuse the weights instead of re-downloading.
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.engineering-os/models
          key: onnx-embed-model-all-MiniLM-L6-v2-v1
      - run: cargo test --manifest-path rag/Cargo.toml

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: taiki-e/install-action@4684b8405694ae9dd42c9f39ba901a70ae83f4a3 # v2.82.9
        with:
          tool: cargo-audit
      # RUSTSEC-2024-0436: `paste` is unmaintained (transitive, via fastembed).
      # Not a vulnerability; ignored to keep the gate on real advisories.
      - run: cargo audit --file rag/Cargo.lock --ignore RUSTSEC-2024-0436

  anonymization:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Anonymization gate (full tree)
        run: |
          bash scripts/anonymization-check.sh all | tee -a "$GITHUB_STEP_SUMMARY"
