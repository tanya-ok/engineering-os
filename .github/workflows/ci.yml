name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          package_json_file: rag/package.json
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: rag/pnpm-lock.yaml
      - run: pnpm --dir rag install --frozen-lockfile
      - run: pnpm --dir rag exec biome ci .
      - run: pnpm --dir rag exec tsc --noEmit

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          package_json_file: rag/package.json
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: rag/pnpm-lock.yaml
      - run: pnpm --dir rag install --frozen-lockfile
      # Unit tests only. The end-to-end suite (EOS_E2E=1) downloads the
      # embedding model and is run locally, not in CI.
      - run: pnpm --dir rag run build
      - run: pnpm --dir rag test

  anonymization:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Anonymization gate (full tree)
        run: |
          bash scripts/anonymization-check.sh all | tee -a "$GITHUB_STEP_SUMMARY"
