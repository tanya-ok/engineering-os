name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@a31add9f179badd605b91cbf1307522daf022cd5 # v2.8.1
        with:
          workspaces: rag
      - run: cargo fmt --manifest-path rag/Cargo.toml --check
      - run: cargo clippy --manifest-path rag/Cargo.toml -- -D warnings

  anonymization:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Anonymization gate (full tree)
        run: |
          bash scripts/anonymization-check.sh all | tee -a "$GITHUB_STEP_SUMMARY"
