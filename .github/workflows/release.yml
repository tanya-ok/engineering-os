name: release

# Build eos-rag for the common platforms and attach the archives to the GitHub
# Release when a v* tag is pushed. The tag is the deliberate act; this workflow
# only packages what the tag points at.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  upload:
    name: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: taiki-e/upload-rust-binary-action@f0d45ae91ee7b8ee928de7a9d04d893a08bcbec6 # v1.30.2
        with:
          bin: eos-rag
          manifest-path: rag/Cargo.toml
          target: ${{ matrix.target }}
          archive: eos-rag-$tag-$target
          token: ${{ secrets.GITHUB_TOKEN }}
