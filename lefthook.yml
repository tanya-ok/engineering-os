# Git hooks. Install once with: lefthook install
# (lefthook is a standalone binary: brew install lefthook, or see lefthook.dev)
pre-commit:
  parallel: true
  commands:
    anonymization:
      run: scripts/anonymization-check.sh staged
    rustfmt:
      glob: "*.rs"
      run: cargo fmt --manifest-path rag/Cargo.toml --check

pre-push:
  commands:
    anonymization-range:
      run: scripts/anonymization-check.sh range
