site_name: engineering-os
site_description: A personal OS for cloud and infrastructure engineers
site_url: https://tanya-ok.github.io/engineering-os/
repo_url: https://github.com/tanya-ok/engineering-os
repo_name: tanya-ok/engineering-os
edit_uri: edit/main/docs/
docs_dir: docs

theme:
  name: material
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - pymdownx.tasklist:
      custom_checkbox: true

extra_css:
  - assets/extra.css

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Concepts: concepts.md
  - The five domains: domains.md
  - The boundary: boundary.md
  - RAG layer: rag.md
  - Working layer: working-layer.md
  - Standards: standards.md
  - Architecture: architecture.md
